secret: github.com/Alvin9999-newpac/fanqiang
mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: global
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090
geodata-mode: false

# DNS 设置 - 强制使用代理DNS
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
  default-nameserver:
    - 8.8.8.8
    - 8.8.4.4
  nameserver:
    - 8.8.8.8
    - 1.1.1.1
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: false
    ipcidr: []

