# ============== 代理组 ==============
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇺🇸 TUIC-1
      - 🇫🇷 TUIC-2
      - 🇺🇸 TUIC-4
      - 🌍 Hysteria-IPv6

  - name: ♻️ 自动选择
    type: url-test
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    proxies:
      - 🇺🇸 TUIC-1
      - 🇫🇷 TUIC-2
      - 🇺🇸 TUIC-4
      - 🌍 Hysteria-IPv6

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 📲 电报信息
